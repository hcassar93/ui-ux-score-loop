<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UI/UX Score Loop Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-neutral-50 text-neutral-950 antialiased">
    <main class="mx-auto w-full max-w-[1800px] px-4 py-4 sm:px-5">
      <header class="sticky top-0 z-30 border-b border-neutral-200 bg-neutral-50/95 pb-3 pt-2 backdrop-blur">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <p class="text-[11px] font-semibold uppercase tracking-wide text-neutral-500">
              UI/UX Score Loop
            </p>
            <h1 class="text-2xl font-semibold tracking-tight sm:text-3xl">{{FLOW_NAME}}</h1>
          </div>
          <div class="flex flex-wrap gap-2 text-xs">
            {{SUMMARY_CHIPS}}
          </div>
        </div>

        <nav class="mt-3 grid gap-2 lg:grid-cols-[1fr_1fr_auto]">
          <div>
            <p class="mb-1 text-[11px] font-semibold uppercase tracking-wide text-neutral-500">Breakpoint</p>
            <div class="flex flex-wrap gap-1.5" data-viewport-controls>
              {{VIEWPORT_BUTTONS}}
            </div>
          </div>
          <div>
            <p class="mb-1 text-[11px] font-semibold uppercase tracking-wide text-neutral-500">Mode</p>
            <div class="flex flex-wrap gap-1.5" data-mode-controls>
              {{MODE_BUTTONS}}
            </div>
          </div>
          <div class="min-w-48 rounded border border-neutral-200 bg-white px-3 py-2 text-xs">
            <p class="font-semibold text-neutral-950">Next</p>
            <p class="mt-0.5 text-neutral-600">{{NEXT_TARGET}}</p>
          </div>
        </nav>
      </header>

      <section class="mt-4 overflow-x-auto rounded-md border border-neutral-200 bg-white">
        <table class="min-w-full border-separate border-spacing-0 text-xs">
          <thead class="bg-neutral-100 text-left text-[11px] uppercase tracking-wide text-neutral-500">
            <tr>
              <th class="sticky left-0 z-30 w-72 border-b border-r border-neutral-200 bg-neutral-100 px-3 py-2">
                View / evidence
              </th>
              {{MATRIX_HEADER}}
            </tr>
          </thead>
          <tbody>
            {{MATRIX_ROWS}}
          </tbody>
          <tfoot class="bg-neutral-950 text-white">
            {{AVERAGE_ROWS}}
          </tfoot>
        </table>
      </section>

    </main>

    <script>
      const viewportButtons = document.querySelectorAll("[data-viewport-filter]");
      const modeButtons = document.querySelectorAll("[data-mode-filter]");
      const rows = document.querySelectorAll("[data-viewport-row]");
      let selectedViewport = "all";
      let selectedMode = "all";

      function setActive(buttons, activeButton) {
        buttons.forEach((candidate) => {
          const active = candidate === activeButton;
          candidate.classList.toggle("bg-neutral-950", active);
          candidate.classList.toggle("text-white", active);
          candidate.classList.toggle("border-neutral-950", active);
          candidate.classList.toggle("bg-white", !active);
          candidate.classList.toggle("text-neutral-700", !active);
          candidate.classList.toggle("border-neutral-200", !active);
        });
      }

      function applyFilters() {
        rows.forEach((row) => {
          const viewportMatch =
            selectedViewport === "all" || row.dataset.viewportRow === selectedViewport;
          const modeMatch =
            selectedMode === "all" || row.dataset.modeRow === selectedMode;
          row.hidden = !(viewportMatch && modeMatch);
        });
      }

      viewportButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedViewport = button.dataset.viewportFilter;
          setActive(viewportButtons, button);
          applyFilters();
        });
      });

      modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedMode = button.dataset.modeFilter;
          setActive(modeButtons, button);
          applyFilters();
        });
      });
    </script>
  </body>
</html>
