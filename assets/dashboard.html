<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UI/UX Score Loop Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .screenshot-frame {
        background-color: #d4d4d4;
        background-image:
          linear-gradient(45deg, rgba(255, 255, 255, 0.55) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(255, 255, 255, 0.55) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.55) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.55) 75%);
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        background-size: 16px 16px;
      }
    </style>
  </head>
  <body class="bg-neutral-50 text-neutral-950 antialiased">
    <main class="mx-auto w-full max-w-[1800px] px-4 py-4 sm:px-5">
      <header class="sticky top-0 z-30 border-b border-neutral-200 bg-neutral-50/95 pb-3 pt-2 backdrop-blur">
        <div class="flex flex-wrap items-end justify-between gap-3">
          <div>
            <p class="text-[11px] font-semibold uppercase tracking-wide text-neutral-500">
              UI/UX Score Loop
            </p>
            <h1 class="text-2xl font-semibold tracking-tight sm:text-3xl">{{FLOW_NAME}}</h1>
          </div>
          <nav class="flex flex-wrap items-end gap-3">
            <div class="flex h-9 items-center gap-2">
              <button class="text-xs font-medium text-neutral-500 underline-offset-4 hover:text-neutral-950 hover:underline" type="button" data-expand-all>
                Expand all
              </button>
              <span class="text-neutral-300">/</span>
              <button class="text-xs font-medium text-neutral-500 underline-offset-4 hover:text-neutral-950 hover:underline" type="button" data-collapse-all>
                Collapse all
              </button>
            </div>
            <div>
              <label class="mb-1 block text-[11px] font-semibold uppercase tracking-wide text-neutral-500" for="viewport-filter">
                Breakpoint
              </label>
              <select id="viewport-filter" class="h-9 rounded-md border border-neutral-300 bg-white px-3 text-sm text-neutral-950" data-viewport-select>
                {{VIEWPORT_OPTIONS}}
              </select>
            </div>
            <div>
              <label class="mb-1 block text-[11px] font-semibold uppercase tracking-wide text-neutral-500" for="mode-filter">
                Mode
              </label>
              <select id="mode-filter" class="h-9 rounded-md border border-neutral-300 bg-white px-3 text-sm text-neutral-950" data-mode-select>
                {{MODE_OPTIONS}}
              </select>
            </div>
          </nav>
        </div>
      </header>

      <section class="mt-4 overflow-x-auto rounded-md border border-neutral-200 bg-white">
        <table class="min-w-full border-separate border-spacing-0 text-xs">
          <thead class="bg-neutral-100 text-left text-[11px] uppercase tracking-wide text-neutral-500">
            <tr>
              <th class="sticky left-0 z-30 w-72 border-b border-r border-neutral-200 bg-neutral-100 px-3 py-2">
                View / evidence
              </th>
              {{MATRIX_HEADER}}
            </tr>
          </thead>
          <tbody>
            {{MATRIX_ROWS}}
          </tbody>
        </table>
      </section>

    </main>

    <div class="fixed inset-0 z-50 hidden bg-black/80 p-4" data-screenshot-modal>
      <div class="flex h-full flex-col gap-3">
        <div class="flex items-center justify-between gap-3 text-white">
          <p class="min-w-0 truncate text-xs" data-screenshot-modal-path></p>
          <button class="rounded-md border border-white/30 px-3 py-1.5 text-sm" type="button" data-screenshot-modal-close>
            Close
          </button>
        </div>
        <div class="flex min-h-0 flex-1 items-center justify-center">
          <img class="max-h-full max-w-full rounded-md bg-white object-contain" alt="" data-screenshot-modal-image />
        </div>
      </div>
    </div>

    <script>
      const viewportSelect = document.querySelector("[data-viewport-select]");
      const modeSelect = document.querySelector("[data-mode-select]");
      const rows = document.querySelectorAll("[data-viewport-row]");
      const contextRows = document.querySelectorAll("[data-context-row]");
      const contextToggles = document.querySelectorAll("[data-toggle-context]");
      const pageToggles = document.querySelectorAll("[data-toggle-page]");
      const viewToggles = document.querySelectorAll("[data-toggle-view]");
      const expandAllButton = document.querySelector("[data-expand-all]");
      const collapseAllButton = document.querySelector("[data-collapse-all]");
      const screenshotButtons = document.querySelectorAll("[data-screenshot-src]");
      const screenshotModal = document.querySelector("[data-screenshot-modal]");
      const screenshotModalImage = document.querySelector("[data-screenshot-modal-image]");
      const screenshotModalPath = document.querySelector("[data-screenshot-modal-path]");
      const screenshotModalClose = document.querySelector("[data-screenshot-modal-close]");
      const collapsedContexts = new Set();
      const collapsedPages = new Set();
      const collapsedViews = new Set();
      let selectedViewport = "all";
      let selectedMode = "all";

      function applyFilters() {
        rows.forEach((row) => {
          const viewportMatch =
            selectedViewport === "all" || row.dataset.viewportRow === selectedViewport;
          const modeMatch =
            selectedMode === "all" || row.dataset.modeRow === selectedMode;
          const pageCollapsed = row.dataset.pageId && collapsedPages.has(row.dataset.pageId);
          const viewCollapsed = row.dataset.viewId && collapsedViews.has(row.dataset.viewId);
          const hiddenByCollapse =
            (pageCollapsed && row.dataset.rowKind !== "page") ||
            (viewCollapsed && row.dataset.rowKind === "detail");
          row.hidden = !(viewportMatch && modeMatch) || hiddenByCollapse;
        });

        contextRows.forEach((row) => {
          const contextCollapsed =
            row.dataset.contextId && collapsedContexts.has(row.dataset.contextId);
          row.hidden = contextCollapsed && row.dataset.rowKind !== "context";
        });

        contextToggles.forEach((button) => {
          const collapsed = collapsedContexts.has(button.dataset.toggleContext);
          button.setAttribute("aria-expanded", String(!collapsed));
          button.textContent = collapsed ? "+" : "-";
        });
        pageToggles.forEach((button) => {
          const collapsed = collapsedPages.has(button.dataset.togglePage);
          button.setAttribute("aria-expanded", String(!collapsed));
          button.textContent = collapsed ? "+" : "-";
        });
        viewToggles.forEach((button) => {
          const collapsed = collapsedViews.has(button.dataset.toggleView);
          button.setAttribute("aria-expanded", String(!collapsed));
          button.textContent = collapsed ? "+" : "-";
        });
      }

      viewportSelect.addEventListener("change", () => {
          selectedViewport = viewportSelect.value;
          applyFilters();
      });

      modeSelect.addEventListener("change", () => {
          selectedMode = modeSelect.value;
          applyFilters();
      });

      contextToggles.forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.toggleContext;
          collapsedContexts.has(id)
            ? collapsedContexts.delete(id)
            : collapsedContexts.add(id);
          applyFilters();
        });
      });

      pageToggles.forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.togglePage;
          collapsedPages.has(id) ? collapsedPages.delete(id) : collapsedPages.add(id);
          applyFilters();
        });
      });

      viewToggles.forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.toggleView;
          collapsedViews.has(id) ? collapsedViews.delete(id) : collapsedViews.add(id);
          applyFilters();
        });
      });

      expandAllButton.addEventListener("click", () => {
        collapsedContexts.clear();
        collapsedPages.clear();
        collapsedViews.clear();
        applyFilters();
      });

      collapseAllButton.addEventListener("click", () => {
        contextToggles.forEach((button) => collapsedContexts.add(button.dataset.toggleContext));
        pageToggles.forEach((button) => collapsedPages.add(button.dataset.togglePage));
        viewToggles.forEach((button) => collapsedViews.add(button.dataset.toggleView));
        applyFilters();
      });

      function closeScreenshotModal() {
        screenshotModal.classList.add("hidden");
        screenshotModalImage.removeAttribute("src");
        screenshotModalPath.textContent = "";
      }

      screenshotButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const src = button.dataset.screenshotSrc;
          screenshotModalImage.src = src;
          screenshotModalImage.alt = src;
          screenshotModalPath.textContent = src;
          screenshotModal.classList.remove("hidden");
        });
      });

      screenshotModalClose.addEventListener("click", closeScreenshotModal);
      screenshotModal.addEventListener("click", (event) => {
        if (event.target === screenshotModal) closeScreenshotModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !screenshotModal.classList.contains("hidden")) {
          closeScreenshotModal();
        }
      });
    </script>
  </body>
</html>
